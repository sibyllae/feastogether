<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>饗賓餐旅線上訂位</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 640px;
            width: 90%;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 24px;
        }

        .svg-wrapper {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .svg-wrapper img {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
        }

        .input-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            margin-bottom: 16px;
        }

        .input-group input {
            padding: 10px 16px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
            width: 200px;
            text-align: center;
            letter-spacing: 4px;
        }

        .input-group input:focus {
            border-color: #e74c3c;
        }

        .btn {
            padding: 10px 32px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            background: #e74c3c;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #c0392b;
        }

        .btn:disabled {
            background: #bbb;
            cursor: not-allowed;
        }

        #result {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }

        #result.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        #result.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>饗賓餐旅線上訂位</h1>

    <div class="svg-wrapper">
        <img id="captcha" src="/svg" alt="驗證碼"/>
    </div>

    <div class="input-group">
        <input type="text" id="fa" placeholder="輸入驗證碼" maxlength="6" autocomplete="off"/>
        <button id="btn" class="btn">訂位</button>
    </div>

    <div id="result"></div>
</div>

<script>
    const fa = document.getElementById('fa');
    const btn = document.getElementById('btn');
    const result = document.getElementById('result');

    btn.addEventListener('click', async () => {
        const value = fa.value.trim();
        if (!value) {
            result.className = 'error';
            result.textContent = '請輸入驗證碼';
            result.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.textContent = '訂位中...';
        result.style.display = 'none';

        try {
            const resp = await fetch('/svg', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({verify: value})
            });

            const data = await resp.json();

            if (data.success) {
                result.className = 'success';
                result.textContent = '✅ ' + data.message;
            } else {
                result.className = 'error';
                result.textContent = '❌ ' + data.message;
            }
            result.style.display = 'block';
        } catch (err) {
            result.className = 'error';
            result.textContent = '❌ 請求失敗: ' + err.message;
            result.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = '訂位';
        }
    });

    // Enter 鍵觸發訂位
    fa.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') btn.click();
    });
</script>
</body>
</html>
